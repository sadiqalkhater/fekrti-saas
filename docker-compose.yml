version: '3.8'

services:
  # ==================== قاعدة البيانات ====================
  postgres:
    image: postgres:15-alpine
    container_name: fekrti-db
    environment:
      POSTGRES_DB: ${DB_NAME:-fekrti_marketplace}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fekrti-network

  # ==================== التطبيق ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fekrti-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-fekrti_marketplace}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fekrti-network
    volumes:
      - ./logs:/app/logs

  # ==================== Redis (مختياري - للـ Caching) ====================
  redis:
    image: redis:7-alpine
    container_name: fekrti-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fekrti-network
    restart: unless-stopped

  # ==================== pgAdmin (لإدارة قاعدة البيانات) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fekrti-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fekrti.sa
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fekrti-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  fekrti-network:
    driver: bridge
